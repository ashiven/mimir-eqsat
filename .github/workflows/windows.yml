name: windows

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-and-test:
    name: Build and test ${{matrix.build-type}} mode
    runs-on: windows-2022
    strategy:
      matrix:
        build-type: [Release] # Debug disabled: link.exe hangs :(

    steps:
      - name: Clone recursively
        uses: actions/checkout@v4
        with:
          repository: mimir/mimir
          path: mimir
          submodules: recursive

      - name: Clone eqsat plugin
        uses: actions/checkout@v4
        with:
          path: mimir/extra/eqsat

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install LIT
        shell: cmd
        run: python -m pip install lit psutil

      - name: Install FileCheck
        uses: i3h/download-release-asset@v1
        with:
          owner: fodinabor
          repo: FileCheckBuild
          tag: latest
          file: FileCheck-x86_64-win.exe
          path: mimir/bin
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure
        working-directory: mimir
        shell: cmd
        run: |
          cmake -E copy bin/FileCheck-x86_64-win.exe bin/FileCheck
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set CC=cl.exe
          set CXX=cl.exe
          python -c "import sys; import os; print(os.path.dirname(sys.executable))" > tmpPath
          set /p PYTHON_PATH= < tmpPath
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{matrix.build-type}} -DBUILD_TESTING=ON -DMIM_BUILD_EXAMPLES=ON -DPython3_ROOT_DIR=%PYTHON_PATH% -DMIM_FILECHECK=bin/FileCheck-x86_64-win.exe -DMIM_LIT_TIMEOUT=300

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: "21.1.8"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Force correct linker
        shell: pwsh
        run: |
          $msvc = Get-ChildItem "${env:VSINSTALLDIR}VC\Tools\MSVC" | Sort-Object Name -Descending | Select-Object -First 1
          $linker = Join-Path $msvc.FullName "bin\Hostx64\x64\link.exe"
          "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$linker" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Debug linker resolution
        run: where link

      - name: Build
        working-directory: mimir
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build -v

      - name: Run lit test suite
        working-directory: mimir
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set PATH=bin;%PATH%
          cmake --build build -v --target lit

      - name: Test
        working-directory: mimir
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set PATH=bin;%PATH%
          ctest --test-dir build --verbose -C ${{matrix.build-type}} --output-on-failure
