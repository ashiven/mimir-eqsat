name: macos

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-and-test:
    name: Build and test ${{matrix.build-type}} mode
    runs-on: macos-latest
    strategy:
      matrix:
        build-type: [Debug, Release]

    steps:
      - name: Clone recursively
        uses: actions/checkout@v4
        with:
          repository: mimir/mimir
          path: mimir
          submodules: recursive

      - name: Clone eqsat plugin
        uses: actions/checkout@v4
        with:
          path: mimir/extra/eqsat

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        working-directory: mimir
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install lit psutil
          echo "$(pwd)/.venv/bin" >> GITHUB_PATH

      - name: Install LLVM and add to PATH
        run: |
          brew install llvm
          LLVM_PREFIX=$(brew --prefix llvm)
          echo "LLVM_PREFIX=${LLVM_PREFIX}" >> $GITHUB_ENV
          echo "${LLVM_PREFIX}/bin" >> $GITHUB_PATH

      - name: Setup ccache
        uses: Chocobo1/setup-ccache-action@v1
        with:
          ccache_options: max_size=500M
          override_cache_key: mac-latest-ccache-${{matrix.build-type}}

      - name: Configure
        working-directory: mimir
        run: |
          CC="${LLVM_PREFIX}/bin/clang" CXX="${LLVM_PREFIX}/bin/clang++"     \
          cmake -B build                                                     \
                -DCMAKE_BUILD_TYPE=${{matrix.build-type}}                    \
                -DBUILD_TESTING=ON -DMIM_BUILD_EXAMPLES=ON                   \
                -DMIM_FILECHECK=${LLVM_PREFIX}/bin/FileCheck                 \
                -DMIM_LIT_TIMEOUT=300                                        \
                -DPython3_EXECUTABLE=.venv/bin/python3

      - name: Build
        working-directory: mimir
        run: cmake --build build -v

      - name: Run lit test suite
        working-directory: mimir
        run: |
          export PATH=$(pwd)/bin:$PATH
          cmake --build build -v --target lit

      - name: Test
        working-directory: mimir
        run: |
          export PATH=$(pwd)/bin:$PATH
          ctest --test-dir build --verbose -C ${{matrix.build-type}} --output-on-failure
